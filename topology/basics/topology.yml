name: Linux-Basics
topology:
  nodes:

    host1:
      kind: linux
      image: nicolaka/netshoot
      binds:
        - /home/shibi/Networking/Linux_Networking/configs/Basics/host1.sh:/bin/host1.sh
      exec:
        - bash /bin/host1.sh

    host2:
      kind: linux
      image: nicolaka/netshoot
      binds:
        - /home/shibi/Networking/Linux_Networking/configs/Basics/host2.sh:/bin/host2.sh
      exec:
        - bash /bin/host2.sh

    router:
      kind: linux
      image: quay.io/frrouting/frr:10.6.0
      binds:
        - /home/shibi/Networking/Linux_Networking/configs/Basics/router.config:/etc/frr/frr.conf

  links:
    - endpoints: ["router:eth1", "host1:eth1"]
    - endpoints: ["router:eth2", "host2:eth1"]