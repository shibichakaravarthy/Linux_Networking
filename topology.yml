name: Linux-Basics
topology:
  nodes:

    host1:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.10.1.2/24 dev eth1
        - ip link set eth1 up

    host2:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.10.1.3/24 dev eth1
        - ip link set eth1 up

    router:
      kind: linux
      image: frrouting/frr:latest
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.10.1.1/24 dev eth1
        - ip link set eth1 up
        - ip addr add 10.10.2.1/24 dev eth2
        - ip link set eth2 up
        - sysctl -w net.ipv4.conf.all.forwarding=1

  links:
    - endpoints: ["router:eth1", "host1:eth1"]
    - endpoints: ["router:eth2", "host2:eth1"]